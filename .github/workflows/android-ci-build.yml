name: Android CI Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android App (APK + AAB)

    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java (important: use stable LTS)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Gradle (speeds up builds)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make Gradle executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # 5. Build Debug APK (for testing)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. Build Release AAB (for Play Store)
      - name: Build Release AAB
        run: ./gradlew bundleRelease

      # 7. Upload outputs (APK + AAB)
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
